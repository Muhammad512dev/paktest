    <style>
      :root {
        --brand-primary: #4f46e5;
        --brand-secondary: #4338ca;
        --brand-light: #eef2ff;
        --app-font: 'Inter', sans-serif;
      }

      body {
        font-family: var(--app-font);
        background-color: #f3f4f6;
      }
      
      /* Urdu Font Classes */
      .font-urdu {
        font-family: 'Noto Nastaliq Urdu', serif;
        line-height: 2.2 !important; 
      }
      .font-urdu-sans {
        font-family: 'Noto Sans Arabic', sans-serif;
      }
      .font-urdu-stylized {
        font-family: 'Reem Kufi', sans-serif;
      }
      
      /* Multi-page Print Logic */
      .page-break {
        break-after: page;
        height: 0;
        margin: 0;
        padding: 0;
      }

      @media print {
        @page {
          margin: 0;
          size: A4;
        }
        body {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
          background-color: white !important;
          margin: 0 !important;
          padding: 0 !important;
        }
        .no-print, 
        .no-print-section,
        header.no-print,
        aside.no-print,
        button.no-print {
          display: none !important;
        }
        #root {
            display: block !important;
        }
        .print-container {
          width: 210mm !important;
          margin: 0 auto !important;
          padding: 0 !important; /* Managed by page-padding inner div */
          box-shadow: none !important;
          border: none !important;
          overflow: visible !important;
          height: auto !important;
          background: white !important;
          position: relative !important;
          left: 0 !important;
          top: 0 !important;
        }
        .columns-2 {
          column-count: 2 !important;
          column-gap: 12mm !important;
        }
        .break-inside-avoid {
          break-inside: avoid !important;
          page-break-inside: avoid;
        }
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }

      /* Dynamic Theme Overrides */
      .bg-brand { background-color: var(--brand-primary) !important; }
      .text-brand { color: var(--brand-primary) !important; }
      .border-brand { border-color: var(--brand-primary) !important; }
      .bg-brand-light { background-color: var(--brand-light) !important; }
      .hover-bg-brand:hover { background-color: var(--brand-secondary) !important; }
    </style>
